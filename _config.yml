title: "TrailMQ – Audit-First MQTT for Regulated Industries"
description: "Audit-first MQTT platform for regulated industries. TrailMQ adds traceability, security policies and audit-ready evidence to MQTT without changing machines."
url: "https://www.trailmq.com"
baseurl: ""
enforce_ssl: www.trailmq.com

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  wiki_articles:
    output: true
    permalink: /wiki/:path/

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------
defaults:
  # Default for wiki articles
  - scope:
      path: ""
      type: "wiki_articles"
    values:
      layout: "wiki-article"
      toc: true

  # Default for normal pages in root
  - scope:
      path: ""
    values:
      layout: default

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-sitemap

# -----------------------------------------------------------------------------
# SEO & Canonical URLs
# -----------------------------------------------------------------------------
# Force trailing slashes for consistency
permalink: pretty

# -----------------------------------------------------------------------------
# Exclude from Jekyll build and sitemap
# -----------------------------------------------------------------------------
exclude:
  - IMPROVEMENTS.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - .git
  - .gitignore
  - .idea
  - "*.sh"
  - .htaccess