<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}

  <!-- Wiki-specific styles -->
  <link rel="stylesheet" href="{{ '/assets/css/wiki.css' | relative_url }}" />

  <!-- Wiki SEO enhancements -->
  {% if page.layout == 'wiki-article' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "TechArticle",
    "headline": "{{ page.title }}",
    "description": "{{ page.description | default: page.excerpt | strip_html | truncate: 160 }}",
    "url": "{{ page.url | absolute_url }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified | default: page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Organization",
      "name": "TrailMQ"
    },
    "publisher": {
      "@type": "Organization",
      "name": "TrailMQ",
      "url": "{{ site.url }}"
    },
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
    {% if page.tags %},
    "keywords": "{{ page.tags | join: ', ' }}"
    {% endif %}
  }
  </script>
  {% endif %}

  <!-- Breadcrumb Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Concepts",
        "item": "{{ '/wiki/' | absolute_url }}"
      }
      {% if page.category %}
      ,{
        "@type": "ListItem",
        "position": 3,
        "name": "{{ page.category }}",
        "item": "{{ '/wiki/category/' | append: page.category | slugify | append: '/' | absolute_url }}"
      }
      {% endif %}
      {% if page.title and page.layout == 'wiki-article' %}
      ,{
        "@type": "ListItem",
        "position": {% if page.category %}4{% else %}3{% endif %},
        "name": "{{ page.title }}",
        "item": "{{ page.url | absolute_url }}"
      }
      {% endif %}
    ]
  }
  </script>
</head>
<body class="wiki subpage">

  <!-- Reading Progress Bar -->
  <div class="reading-progress">
    <div class="reading-progress-bar" id="readBar"></div>
  </div>

  {% include header.html %}

  <div class="wiki-layout">
    {% include wiki/sidebar.html %}

    <main class="wiki-main">
      {{ content }}
    </main>
  </div>

  <!-- Mobile Sidebar Toggle (FAB) -->
  <button class="wiki-mobile-toggle" id="wiki-mobile-toggle" aria-label="Open navigation">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>

  <!-- Overlay for mobile -->
  <div class="wiki-overlay" id="wiki-overlay"></div>

  {% include footer.html %}

  <!-- Wiki JavaScript -->
  <script>
    (function () {
      'use strict';

      // Mobile sidebar
      var side = document.getElementById('wiki-sidebar');
      var fab  = document.getElementById('wiki-mobile-toggle');
      var overlay = document.getElementById('wiki-overlay');

      function closeSide() {
        if (side) side.classList.remove('open');
        if (overlay) overlay.classList.remove('show');
      }
      if (fab && side) {
        fab.addEventListener('click', function () {
          var open = side.classList.toggle('open');
          if (overlay) overlay.classList.toggle('show', open);
        });
      }
      if (overlay) overlay.addEventListener('click', closeSide);
      if (side) side.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', closeSide);
      });

      // Sidebar search filter
      var search = document.getElementById('wiki-search');
      if (search) {
        var groups = Array.prototype.slice.call(document.querySelectorAll('[data-nav-group]'));
        search.addEventListener('input', function () {
          var q = search.value.trim().toLowerCase();
          groups.forEach(function (g) {
            var any = false;
            g.querySelectorAll('li').forEach(function (li) {
              var match = !q || li.textContent.toLowerCase().indexOf(q) !== -1;
              li.style.display = match ? '' : 'none';
              if (match) any = true;
            });
            g.style.display = any ? '' : 'none';
          });
        });
      }

      // Reading progress bar
      var bar = document.getElementById('readBar');
      if (bar) {
        var onScroll = function () {
          var h = document.documentElement;
          var max = h.scrollHeight - h.clientHeight;
          bar.style.width = (max > 0 ? (h.scrollTop / max) * 100 : 0) + '%';
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }

      // TOC scrollspy (for articles with .toc-rail)
      var rail = document.querySelector('.toc-rail');
      if (rail && 'IntersectionObserver' in window) {
        var links = Array.prototype.slice.call(rail.querySelectorAll('a'));
        var map = {};
        links.forEach(function (a) {
          var id = a.getAttribute('href').replace('#', '');
          var el = document.getElementById(id);
          if (el) map[id] = a;
        });
        var spy = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) {
              links.forEach(function (l) { l.classList.remove('active'); });
              if (map[e.target.id]) map[e.target.id].classList.add('active');
            }
          });
        }, { rootMargin: '-20% 0px -70% 0px' });
        Object.keys(map).forEach(function (id) {
          var el = document.getElementById(id);
          if (el) spy.observe(el);
        });
      }
    })();
  </script>
</body>
</html>
